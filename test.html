<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OTA Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="./assets/CSS/test.css" />
  </head>
  <body>
    <header class="topbar">
      <h1 class="title">Carte OTA</h1>
        <div class="dropdown">
          <button class="btn btn-secondary dropdown-toggle" type="button" id="dropdownMenuButton2" data-bs-toggle="dropdown" aria-expanded="false">Dropdown button</button>
            <ul class="dropdown-menu dropdown-menu-dark" aria-labelledby="dropdownMenuButton2">
              <li><a class="dropdown-item active" href="#">Action</a></li>
              <li><a class="dropdown-item" href="#">Another action</a></li>
              <li><a class="dropdown-item" href="#">Something else here</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item" href="#">Separated link</a></li>
            </ul>
        </div>
          <button id="locateBtnHeader" class="btn btn-primary">Me localiser</button>
        </header>
    <main>
        <section id="map"></section>
    </main>

<footer class="bottombar">
  <div class="legend">
    <p class="legend-item name">Légende :</p>
    <span class="legend-item">
      <span class="dot red"></span> Phare
    </span>

    <span class="legend-item">
      <span class="dot green"></span> Bunker militaire
    </span>

    <span class="legend-item">
      <span class="dot cyan"></span> Bunker civil
    </span>

    <span class="legend-item">
      <span class="dot yellow"></span> Plage
    </span>

  </div>
</footer>


    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="./js/config.js"></script>
    <script src="./js/geo.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/departements.js"></script>
    <script src="./js/overpass.js"></script>
    <script src="./js/points-osm.js"></script>
    <script src="./js/carte.js"></script>
    <script src="./js/geolocalisation.js"></script>
    <script src="./main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
